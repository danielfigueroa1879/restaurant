<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú del día</title>
  <link rel="stylesheet" href="css/public.css" />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#b8360a" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Menú" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="subtitle">Restaurante</div>
      <div class="brand" id="brand">Cargando...</div>
      <div class="date" id="date"></div>
      <div id="mesaBadge"></div>
    </header>

    <div id="content">
      <div class="card"><div class="empty">Cargando menú...</div></div>
    </div>

    <button class="refresh" onclick="loadMenu()">Actualizar</button>
    <div class="updated" id="updated"></div>

    <footer>
      Gracias por visitarnos<br />
      <span style="opacity:0.6"></span>

      <div class="footer-signature">
        <div class="fs-contact">
          <a href="tel:+56994712888">📞 +56 9 9471 2888</a>
        </div>
        <div class="fs-copy">© 2026 Todos los derechos reservados.</div>
        <div class="fs-author">Plataforma desarrollada por <strong>Daniel Figueroa Chacama</strong>.<br />Ingeniero en Informática &amp; Ciberseguridad.</div>
      </div>
    </footer>
  </div>

  <button class="to-top" id="toTopBtn" aria-label="Volver arriba" onclick="scrollToTop()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <div class="install-banner" id="installBanner">
    <button class="install-banner-close" onclick="dismissBanner()" aria-label="Cerrar">&times;</button>
    <div class="install-banner-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"/><polyline points="7 10 12 15 17 10"/><path d="M4 21h16"/>
      </svg>
    </div>
    <div class="install-banner-content">
      <div class="install-banner-title" id="installTitle">Instala la app</div>
      <div class="install-banner-body" id="installBody">Añádela a tu pantalla de inicio para acceso rápido.</div>
    </div>
    <button class="install-banner-action" id="installAction" onclick="installApp()">Instalar</button>
  </div>

  <div class="cart-bar" id="cartBar">
    <div class="info">
      <span class="count" id="cartCount">0 ítems</span>
      <span class="total" id="cartTotal">$0</span>
    </div>
    <button onclick="sendWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.2s-.8.9-1 1.1c-.2.2-.4.2-.6.1-.4-.2-1.4-.5-2.6-1.6-1-.9-1.6-1.9-1.8-2.3-.2-.3 0-.5.1-.7l.5-.6c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5s-.7-1.6-.9-2.2c-.2-.6-.5-.5-.7-.5H7.5c-.2 0-.5.1-.8.4s-1 1-1 2.4c0 1.4 1 2.8 1.1 3 .1.2 2 3.1 4.9 4.3 1.4.5 2 .6 2.7.5.4-.1 1.4-.6 1.6-1.2.2-.6.2-1.1.1-1.2 0-.1-.2-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.4.8 3 1.3 4.8 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3.1.8.8-3-.2-.3C4 15 3.5 13.5 3.5 12 3.5 7.3 7.3 3.5 12 3.5S20.5 7.3 20.5 12 16.7 20.2 12 20.2z"/></svg>
      Pedir por WhatsApp
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/public.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    let deferredInstallPrompt = null;
    let hideBannerTimer = null;
    const banner = document.getElementById('installBanner');
    const installTitle = document.getElementById('installTitle');
    const installBody = document.getElementById('installBody');
    const installAction = document.getElementById('installAction');

    const isStandalone = () =>
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    const isIos = () => {
      const ua = window.navigator.userAgent;
      const iOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      const iPadOS = ua.includes('Mac') && 'ontouchend' in document;
      return iOS || iPadOS;
    };

    function showBanner(seconds = 7) {
      if (isStandalone()) return;
      banner.classList.add('visible');
      clearTimeout(hideBannerTimer);
      hideBannerTimer = setTimeout(hideBanner, seconds * 1000);
    }

    function hideBanner() {
      banner.classList.remove('visible');
      clearTimeout(hideBannerTimer);
    }

    window.dismissBanner = function () {
      hideBanner();
      try { localStorage.setItem('installDismissed', Date.now()); } catch (_) {}
    };

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      installTitle.textContent = 'Instala la app';
      installBody.textContent = 'Tenla siempre a mano en tu pantalla de inicio.';
      installAction.style.display = '';
      installAction.textContent = 'Instalar';
      showBanner(8);
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      hideBanner();
    });

    window.installApp = async function () {
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const { outcome } = await deferredInstallPrompt.userChoice;
        if (outcome === 'accepted') hideBanner();
        deferredInstallPrompt = null;
      }
    };

    window.addEventListener('load', () => {
      if (isStandalone()) return;
      const last = Number(localStorage.getItem('installDismissed') || 0);
      if (Date.now() - last < 1000 * 60 * 60 * 24 * 3) return;
      if (isIos()) {
        installTitle.textContent = 'Instala en tu iPhone';
        installBody.innerHTML = 'Toca <b>Compartir</b> y luego <b>“Añadir a pantalla de inicio”</b>.';
        installAction.style.display = 'none';
        setTimeout(() => showBanner(8), 1500);
      }
    });
  </script>
</body>
</html>
